<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Game Builder v5.0 - FIXED LAYOUT</title>
    <style>
        :root { --accent: #bc13fe; --bg: #111; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: #fff; }
        #settings { width: 380px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid var(--accent); }
        .q-card { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        input { width: 100%; padding: 8px; margin: 4px 0; border-radius: 4px; border: 1px solid #333; background: #000; color: #00f7ff; box-sizing: border-box; }
        #preview { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; background: #000; }
        .frame-cont { flex-grow: 1; border: 1px solid #444; background: #000; border-radius: 10px; overflow: hidden; }
        .btn-copy { background: var(--accent); color: #fff; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="settings">
    <h2 id="t-title">Editor v5.0</h2>
    <label>Герой (PNG URL):</label>
    <input type="text" id="h-url" value="https://cdn-icons-png.flaticon.com/512/616/616430.png" oninput="update()">
    <label>Цвет:</label>
    <input type="color" id="h-color" value="#bc13fe" oninput="update()">
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">КОПИРОВАТЬ ДЛЯ GENIALLY</button>
</div>

<div id="preview">
    <div id="f-box" class="frame-cont"></div>
</div>

<script>
    let questions = [
        { q: "Book - это...", a: ["Книга", "Ручка", "Стол"], c: 0 },
        { q: "I ___ happy.", a: ["is", "am", "are"], c: 1 },
        { q: "Red - это...", a: ["Синий", "Красный", "Зеленый"], c: 1 },
        { q: "Apple - это...", a: ["Яблоко", "Груша", "Банан"], c: 0 },
        { q: "Home - это...", a: ["Дом", "Лес", "Сад"], c: 0 },
        { q: "One + Two = ?", a: ["Two", "Three", "Four"], c: 1 },
        { q: "Cat - это...", a: ["Собака", "Кот", "Птица"], c: 1 },
        { q: "Sun - это...", a: ["Луна", "Звезда", "Солнце"], c: 2 },
        { q: "Water - это...", a: ["Вода", "Огонь", "Земля"], c: 0 },
        { q: "Big - это...", a: ["Маленький", "Большой", "Средний"], c: 1 },
        { q: "Mother - это...", a: ["Папа", "Мама", "Брат"], c: 1 },
        { q: "Green - это...", a: ["Зеленый", "Желтый", "Серый"], c: 0 },
        { q: "Friend - это...", a: ["Враг", "Друг", "Сосед"], c: 1 },
        { q: "Jump - это...", a: ["Бег", "Прыжок", "Сон"], c: 1 }
    ];

    function render() {
        const c = document.getElementById('q-list');
        c.innerHTML = '';
        questions.forEach((q, i) => {
            const d = document.createElement('div');
            d.className = 'q-card';
            d.innerHTML = `<input type="text" value="${q.q}" oninput="questions[${i}].q=this.value;update()">
            <div style="display:flex;gap:2px"><input type="text" value="${q.a[0]}" oninput="questions[${i}].a[0]=this.value;update()"><input type="text" value="${q.a[1]}" oninput="questions[${i}].a[1]=this.value;update()"><input type="text" value="${q.a[2]}" oninput="questions[${i}].a[2]=this.value;update()"></div>`;
            c.appendChild(d);
        });
    }

    function getFinalCode() {
        const h = document.getElementById('h-url').value;
        const col = document.getElementById('h-color').value;
        const qStr = JSON.stringify(questions);
        
        // В этой версии координаты X и Y для платформ жестко прописаны в цикле
        const game = `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body,html{margin:0;padding:0;overflow:hidden;background:transparent;height:100%;width:100%}canvas{display:block;background:transparent}#u{position:absolute;top:10px;left:10px;display:flex;gap:5px;z-index:20}.b{background:rgba(0,0,0,0.7);color:#fff;border:1px solid ${col};padding:5px 10px;border-radius:10px;font-size:12px}#q{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,20,0.8);border:1px solid ${col};border-radius:20px;padding:20px;width:260px;color:#fff;text-align:center;backdrop-filter:blur(10px);z-index:30}.bt{background:rgba(255,255,255,0.1);border:1px solid ${col};color:#fff;width:100%;padding:10px;margin:5px 0;border-radius:10px;cursor:pointer;font-weight:bold}</style></head><body><div id="u"><div class="b" id="h">❤️ ❤️ ❤️</div><div class="b" id="s">STEP: 1/14</div></div><div id="q"><div id="qt" style="font-size:18px;margin-bottom:15px"></div><div id="as"></div></div><canvas id="c"></canvas><script>const img=new Image();img.src="${h}";const cvs=document.getElementById("c"),ctx=cvs.getContext("2d"),tasks=${qStr};let cur=0,liv=3,jT=1,sP={x:0,y:0},tP={x:0,y:0};function rs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}window.onresize=rs;rs();const pls=[];for(let i=0;i<15;i++){pls.push({x:30+(i*55),y:cvs.height-50-(i*25)})}let hP={x:pls[0].x,y:pls[0].y};function dP(x,y,a){ctx.save();ctx.translate(x,y);ctx.fillStyle=a?"${col}":"rgba(100,100,100,0.3)";ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(30,-15);ctx.lineTo(60,0);ctx.lineTo(30,15);ctx.closePath();ctx.fill();ctx.restore()}function dH(x,y,t){const b=Math.sin(t*Math.PI)*40;if(img.complete)ctx.drawImage(img,x+5,y-b-50,50,60)}function u(){ctx.clearRect(0,0,cvs.width,cvs.height);pls.forEach((p,i)=>dP(p.x,p.y,i<=cur));if(jT<1){jT+=0.05;hP.x=sP.x+(tP.x-sP.x)*jT;hP.y=sP.y+(tP.y-sP.y)*jT;if(jT>=1){jT=1;if(cur<14){document.getElementById("q").style.display="block";uQ()}else f()}}dH(hP.x,hP.y,jT);requestAnimationFrame(u)}function uQ(){document.getElementById("s").innerText="STEP: "+(cur+1)+"/14";document.getElementById("qt").innerText=tasks[cur].q;const b=document.getElementById("as");b.innerHTML="";tasks[cur].a.forEach((t,i)=>{const btn=document.createElement("button");btn.className="bt";btn.innerText=t;btn.onclick=()=>{if(i===tasks[cur].c){sP={x:hP.x,y:hP.y};cur++;tP={x:pls[cur].x,y:pls[cur].y};jT=0;document.getElementById("q").style.display="none"}else{liv--;document.getElementById("h").innerText="❤️ ".repeat(liv);if(liv<=0)f()}};b.appendChild(btn)})}function f(){const q=document.getElementById("q");q.style.display="block";const w=liv>0;q.innerHTML="<h2>"+(w?"WIN!":"GAME OVER")+"</h2><button class=\'bt\' onclick=\'location.reload()\'>RESTART</button>"}uQ();u();<\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`;
        return game.replace(/\s+/g, ' ').trim();
    }

    function update() {
        document.getElementById('f-box').innerHTML = getFinalCode();
    }

    function copyCode() {
        const el = document.createElement('textarea');
        el.value = getFinalCode();
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("КОД СКОПИРОВАН!");
    }

    render();
    update();
</script>
</body>
</html>
